<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Flow - hkrproject</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container" id="appCard">
        <div class="top-bar">
            <div class="brand">HKR<span>PROJECT</span></div>
            
            <div class="config-tools">
                <span class="tool-icon" onclick="exportData()" title="Backup Data">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </span>

                <label for="imageLoader" class="tool-icon" title="Ganti Wallpaper">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                </label>
                <input type="file" id="imageLoader" accept="image/*" onchange="handleImage(this)">

                <span class="tool-icon" onclick="resetBg()" title="Hapus Background">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </span>
            </div>
        </div>

        <div class="header-stats">
            <small class="label-main">TOTAL SALDO ANDA</small>
            <h1 id="saldoTotal">Rp 0</h1>
            
            <div class="mini-stats">
                <div class="stat-box">
                    <p>Pemasukan</p>
                    <h4 id="totalMasuk" class="txt-in">Rp 0</h4>
                </div>
                <div class="stat-box">
                    <p>Pengeluaran</p>
                    <h4 id="totalKeluar" class="txt-out">Rp 0</h4>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchView('harian')">Harian</button>
                <button class="tab-btn" onclick="switchView('ringkasan')">Laporan</button>
            </div>

            <div class="input-card">
                <div class="input-row">
                    <input type="text" id="keterangan" placeholder="Keterangan...">
                    <select id="tipe">
                        <option value="keluar">Keluar</option>
                        <option value="masuk">Masuk</option>
                    </select>
                </div>
                <div class="input-row">
                    <input type="number" id="nominal" placeholder="Rp 0">
                    <button class="btn-add" onclick="tambahData()">Simpan</button>
                </div>
            </div>

            <div id="view-harian" class="scroll-area">
                <ul id="daftar" class="transaction-list"></ul>
            </div>

            <div id="view-ringkasan" class="scroll-area" style="display:none;">
                <div class="report-container">
                    <h5>Statistik Bulan Ini</h5>
                    <div id="bulanIni"></div>
                    <h5 style="margin-top: 20px;">Statistik Tahun Ini</h5>
                    <div id="tahunIni"></div>
                </div>
            </div>
        </div>

        <div class="watermark">hkrproject</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
