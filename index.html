<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HKR Finance Minimalist</title>
    <link rel="stylesheet" href="style.css?v=5.0">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="app-container">
        <div class="tab-nav">
            <div class="tab-btn active" onclick="switchTab('transaksi')">Utama</div>
            <div class="tab-btn" onclick="switchTab('dompet')">Digital</div>
            <div class="tab-btn" onclick="switchTab('tabungan')">Simpanan</div>
        </div>

        <div id="page-transaksi" class="page active">
            <div class="hero-section">
                <p>Total Kekayaan</p>
                <h1 id="saldoTotal">Rp 0</h1>
            </div>

            <div class="chart-box">
                <canvas id="myChart"></canvas>
            </div>

            <div class="quick-stats">
                <div class="q-item">
                    <span>Cash</span>
                    <strong id="saldoCash">0</strong>
                </div>
                <div class="q-item">
                    <span>Digital</span>
                    <strong id="saldoDigital">0</strong>
                </div>
                <div class="q-item">
                    <span>Savings</span>
                    <strong id="saldoTabungan">0</strong>
                </div>
            </div>

            <div class="input-area">
                <div class="i-group">
                    <input type="text" id="keterangan" placeholder="Nama transaksi...">
                    <input type="number" id="nominal" placeholder="Rp...">
                </div>
                <div class="i-group">
                    <select id="sumber">
                        <option value="cash">Cash</option>
                        <option value="digital">Digital</option>
                        <option value="tabungan">Savings</option>
                    </select>
                    <select id="tipe">
                        <option value="masuk">Masuk</option>
                        <option value="keluar">Keluar</option>
                    </select>
                    <button class="btn-main" onclick="tambahData()">+</button>
                </div>
            </div>

            <div class="list-section">
                <ul id="daftar" class="transaction-list"></ul>
            </div>
        </div>

        <div id="page-dompet" class="page">
            <div class="hero-section"><h1>Transfer Digital</h1></div>
            <div class="input-area">
                <input type="number" id="nominalTopUp" placeholder="Nominal Top Up..." style="margin-bottom:10px; width:100%">
                <button class="btn-full" onclick="prosesTransfer('cash', 'digital', 'nominalTopUp', 'Top Up Digital')">Pindahkan dari Cash</button>
            </div>
            <ul id="daftarTopUp" class="transaction-list"></ul>
        </div>

        <div id="page-tabungan" class="page">
            <div class="hero-section"><h1>Tabungan</h1></div>
            <div class="input-area">
                <input type="number" id="nominalNabung" placeholder="Nominal Menabung..." style="margin-bottom:10px; width:100%">
                <button class="btn-full" style="background: #facc15; color:#000" onclick="prosesTransfer('cash', 'tabungan', 'nominalNabung', 'Menabung')">Simpan ke Tabungan</button>
            </div>
            <ul id="daftarNabung" class="transaction-list"></ul>
        </div>

        <div class="footer-actions">
            <span onclick="exportData()">Backup</span>
            <label for="importFile">Restore</label>
            <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        </div>
    </div>

    <script src="script.js?v=5.0"></script>
</body>
</html>
