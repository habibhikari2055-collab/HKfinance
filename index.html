<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HKR Finance - Clean Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <!-- PAGE 1: MAIN -->
        <div id="page-harian" class="page active">
            <div class="brand-header">
                <div class="brand">HKR<span>FINANCE</span></div>
                <div class="user-avatar">HK</div>
            </div>

            <div class="premium-card main-balance">
                <p class="card-label">Total Balance</p>
                <h1 id="saldoAktif">Rp 0</h1>
                <div class="card-footer">
                    <div class="sub-stat"><span>Cash</span><p id="saldoCash">Rp 0</p></div>
                    <div class="sub-stat"><span>Digital</span><p id="saldoDigital">Rp 0</p></div>
                </div>
            </div>

            <div class="glass-section">
                <p class="section-title">Record Transaction</p>
                <div class="i-grid">
                    <input type="text" id="keterangan" placeholder="Keterangan">
                    <input type="number" id="nominal" placeholder="Rp">
                    <select id="sumber"><option value="cash">Cash</option><option value="digital">Digital</option></select>
                    <select id="tipe"><option value="keluar">Keluar</option><option value="masuk">Masuk</option></select>
                </div>
                <button class="btn-action-main btn-primary" onclick="tambahData()">RECORD TRANSACTION</button>
            </div>

            <ul id="daftar" class="transaction-list"></ul>
        </div>

        <!-- PAGE 2: DIGITAL -->
        <div id="page-digital" class="page">
            <div class="brand-header"><div class="brand">DIGITAL<span>FLOW</span></div></div>
            <div class="premium-card digital-variant">
                <p class="card-label">Digital Assets</p>
                <h1 id="saldoDigitalHalaman">Rp 0</h1>
            </div>
            <div class="glass-section">
                <p class="section-title">Transfer In</p>
                <input type="number" id="nominalTopUp" placeholder="Nominal Rp" class="full-input">
                <button class="btn-action-main btn-digital" onclick="prosesTopUp()">EXECUTE TRANSFER</button>
            </div>
        </div>

        <!-- PAGE 3: VAULT -->
        <div id="page-tabungan" class="page">
            <div class="brand-header"><div class="brand">SAVINGS<span>VAULT</span></div></div>
            
            <div class="glass-section">
                <p class="section-title">Create New Target</p>
                <div class="i-grid">
                    <input type="text" id="inputNamaGoal" placeholder="Nama Rencana">
                    <input type="number" id="inputTargetNominal" placeholder="Target Rp">
                </div>
                <button class="btn-action-main btn-vault" onclick="createVaultPlan()">CREATE NEW PLAN</button>
            </div>

            <!-- List Container Plan -->
            <div id="vaultPlansContainer"></div>

            <div class="glass-section" id="areaNabungVault" style="display:none;">
                <p class="section-title">Manage Savings</p>
                <select id="pilihPlan" class="full-input" style="margin-bottom:12px"></select>
                <input type="number" id="nominalNabung" placeholder="Nominal Rp" class="full-input" style="margin-bottom:12px">
                <div class="btn-group-row">
                    <button class="btn-in" onclick="prosesTabungan('masuk')">SECURE</button>
                    <button class="btn-out" onclick="prosesTabungan('keluar')">RELEASE</button>
                </div>
            </div>
        </div>

        <!-- NAVIGATION -->
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('harian')">Main</div>
            <div class="nav-item" onclick="switchTab('digital')">Digital</div>
            <div class="nav-item" onclick="switchTab('tabungan')">Vault</div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
