<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HKR Finance Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0f1a;
            --card-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --surface: #161b2c;
            --text: #ffffff;
            --accent: #8b5cf6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .app-container { 
            width: 100%; max-width: 450px; height: 100vh; 
            margin: 0 auto; display: flex; flex-direction: column; 
            padding: 20px 20px 80px 20px; position: relative;
        }

        /* Header */
        .brand-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .brand { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.5px; }
        .brand span { color: var(--accent); }
        .user-avatar { width: 35px; height: 35px; background: var(--surface); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; border: 1px solid #334155; }

        /* Card Stats */
        .main-card, .saving-card {
            background: var(--card-grad); padding: 22px; border-radius: 24px; 
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.2); margin-bottom: 20px;
        }
        .saving-card { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); box-shadow: 0 15px 30px rgba(245, 158, 11, 0.15); }
        .main-card p, .saving-card p { font-size: 11px; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        .main-card h1, .saving-card h1 { font-size: 2rem; margin: 5px 0; font-weight: 800; }
        .card-footer { display: flex; gap: 20px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; }
        .sub-stat span { font-size: 10px; opacity: 0.7; display: block; }
        .sub-stat p { font-size: 13px; font-weight: 700; }

        /* Chart Section */
        .chart-section { background: var(--surface); border-radius: 20px; padding: 15px; margin-bottom: 20px; text-align: center; }
        .chart-container-sm { height: 130px; width: 100%; }
        .chart-controls { display: flex; justify-content: center; gap: 12px; margin-top: 10px; }
        .chart-controls span { font-size: 9px; color: var(--accent); cursor: pointer; font-weight: 800; opacity: 0.5; }
        .chart-controls span.active { opacity: 1; text-decoration: underline; }

        /* Input area */
        .input-modern { background: var(--surface); padding: 15px; border-radius: 20px; margin-bottom: 20px; }
        .i-row { display: flex; gap: 8px; margin-bottom: 8px; }
        input, select { background: #1e253a; color: white; border: 1px solid #2d364f; padding: 10px; border-radius: 12px; font-size: 13px; flex: 1; outline: none; }
        .btn-prime { background: var(--accent); color: white; border: none; width: 45px; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; }
        .btn-full { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* Savings Action */
        .action-box { background: var(--surface); padding: 18px; border-radius: 20px; margin-bottom: 20px; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-in { flex: 1; background: #10b981; color: white; border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-out { flex: 1; background: #ef4444; color: white; border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* List Items */
        .page { display: none; height: 100%; overflow-y: auto; padding-bottom: 40px; }
        .page.active { display: block; }
        .transaction-list { list-style: none; }
        .item { background: var(--surface); padding: 14px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-left: 4px solid transparent; }
        .item-info h4 { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
        .badge-row { display: flex; gap: 4px; }
        .badge { font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: 800; text-transform: uppercase; }
        .bg-cash { background: rgba(99, 102, 241, 0.15); color: #818cf8; }
        .bg-digital { background: rgba(168, 85, 247, 0.15); color: #c084fc; }
        .bg-in { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .bg-out { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .item-amount { text-align: right; }
        .item-amount p { font-size: 14px; font-weight: 700; }
        .btn-del { background: none; border: none; color: #475569; font-size: 10px; margin-top: 5px; cursor: pointer; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #161b2c; display: flex; padding: 12px; border-top: 1px solid #2d364f; justify-content: space-around; z-index: 100; }
        .nav-item { font-size: 11px; color: #64748b; font-weight: 600; cursor: pointer; text-align: center; opacity: 0.6; }
        .nav-item.active { color: var(--accent); opacity: 1; }

        .backup-links { text-align: center; margin-top: 10px; font-size: 10px; opacity: 0.4; }
        .backup-links span { margin: 0 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- PAGE 1: HARIAN -->
        <div id="page-harian" class="page active">
            <div class="brand-header">
                <div class="brand">HKR<span>FINANCE</span></div>
                <div class="user-avatar">HK</div>
            </div>

            <div class="main-card">
                <p>Uang Siap Pakai</p>
                <h1 id="saldoAktif">Rp 0</h1>
                <div class="card-footer">
                    <div class="sub-stat"><span>Cash</span><p id="saldoCash">Rp 0</p></div>
                    <div class="sub-stat"><span>Digital</span><p id="saldoDigital">Rp 0</p></div>
                </div>
            </div>

            <div class="chart-section">
                <div class="chart-container-sm"><canvas id="myChart"></canvas></div>
                <div class="chart-controls">
                    <span id="btn-line" onclick="setChart('line')" class="active">Trend</span>
                    <span id="btn-bar" onclick="setChart('bar')">Bar</span>
                    <span id="btn-doughnut" onclick="setChart('doughnut')">Ratio</span>
                </div>
            </div>

            <div class="input-modern">
                <div class="i-row">
                    <input type="text" id="keterangan" placeholder="Keterangan...">
                    <input type="number" id="nominal" placeholder="Rp...">
                </div>
                <div class="i-row">
                    <select id="sumber">
                        <option value="cash">Cash</option>
                        <option value="digital">Digital</option>
                    </select>
                    <select id="tipe">
                        <option value="keluar">Keluar</option>
                        <option value="masuk">Masuk</option>
                    </select>
                    <button class="btn-prime" onclick="tambahData()">+</button>
                </div>
            </div>
            <ul id="daftar" class="transaction-list"></ul>
        </div>

        <!-- PAGE 2: TABUNGAN -->
        <div id="page-tabungan" class="page">
            <div class="brand-header"><div class="brand">SAVINGS<span>VAULT</span></div></div>
            <div class="saving-card">
                <p>Simpanan Terkunci</p>
                <h1 id="saldoTabungan">Rp 0</h1>
            </div>
            <div class="action-box">
                <input type="number" id="nominalNabung" placeholder="Nominal Rp..." style="width:100%">
                <div class="btn-group">
                    <button class="btn-in" onclick="prosesTabungan('masuk')">SIMPAN</button>
                    <button class="btn-out" onclick="prosesTabungan('keluar')">TARIK</button>
                </div>
            </div>
            <ul id="daftarNabung" class="transaction-list"></ul>
        </div>

        <!-- PAGE 3: DIGITAL -->
        <div id="page-digital" class="page">
            <div class="brand-header"><div class="brand">WALLET<span>TRANSFER</span></div></div>
            <div class="input-modern" style="margin-top: 20px;">
                <input type="number" id="nominalTopUp" placeholder="Nominal Top Up..." style="width:100%; margin-bottom:12px;">
                <button class="btn-full" onclick="prosesTopUp()">TOP UP DARI CASH</button>
            </div>
            <ul id="daftarTopUp" class="transaction-list"></ul>
            <div class="backup-links">
                <span onclick="exportData()">BACKUP DATA</span>
                <label for="importFile" style="cursor:pointer">RESTORE</label>
                <input type="file" id="importFile" style="display:none" onchange="importData(event)">
            </div>
        </div>

        <!-- NAV -->
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('harian')">Harian</div>
            <div class="nav-item" onclick="switchTab('tabungan')">Tabungan</div>
            <div class="nav-item" onclick="switchTab('digital')">Digital</div>
        </nav>
    </div>

    <script>
        let dataFinance = JSON.parse(localStorage.getItem('hkr_v7_data')) || [];
        let myChart = null;
        let chartMode = 'line';

        function switchTab(tab) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + tab).classList.add('active');
            event.currentTarget.classList.add('active');
            updateUI();
        }

        function setChart(mode) {
            chartMode = mode;
            document.querySelectorAll('.chart-controls span').forEach(s => s.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            updateUI();
        }

        function tambahData() {
            const ket = document.getElementById('keterangan').value;
            const nom = document.getElementById('nominal').value;
            if (!ket || !nom) return;
            dataFinance.push({
                id: Date.now(),
                keterangan: ket,
                nominal: parseInt(nom),
                tipe: document.getElementById('tipe').value,
                sumber: document.getElementById('sumber').value,
                tanggal: new Date().toISOString()
            });
            save();
            document.getElementById('keterangan').value = "";
            document.getElementById('nominal').value = "";
        }

        function prosesTabungan(aksi) {
            const nom = parseInt(document.getElementById('nominalNabung').value);
            if (!nom) return;
            if (aksi === 'masuk') {
                dataFinance.push({ id: Date.now(), keterangan: "Menabung (Out)", nominal: nom, tipe: 'keluar', sumber: 'cash', tanggal: new Date().toISOString() });
                dataFinance.push({ id: Date.now()+1, keterangan: "Simpanan Masuk", nominal: nom, tipe: 'masuk', sumber: 'tabungan', tanggal: new Date().toISOString() });
            } else {
                dataFinance.push({ id: Date.now(), keterangan: "Tarik Simpanan", nominal: nom, tipe: 'keluar', sumber: 'tabungan', tanggal: new Date().toISOString() });
                dataFinance.push({ id: Date.now()+1, keterangan: "Hasil Tarik (In)", nominal: nom, tipe: 'masuk', sumber: 'cash', tanggal: new Date().toISOString() });
            }
            save();
            document.getElementById('nominalNabung').value = "";
        }

        function prosesTopUp() {
            const nom = parseInt(document.getElementById('nominalTopUp').value);
            if (!nom) return;
            dataFinance.push({ id: Date.now(), keterangan: "Top Up (Out)", nominal: nom, tipe: 'keluar', sumber: 'cash', tanggal: new Date().toISOString() });
            dataFinance.push({ id: Date.now()+1, keterangan: "Top Up (In Digital)", nominal: nom, tipe: 'masuk', sumber: 'digital', tanggal: new Date().toISOString() });
            save();
            document.getElementById('nominalTopUp').value = "";
            switchTab('harian');
        }

        function save() {
            localStorage.setItem('hkr_v7_data', JSON.stringify(dataFinance));
            updateUI();
        }

        function updateUI() {
            let cash = 0, digital = 0, savings = 0, inMon = 0, outMon = 0;
            const dMain = document.getElementById('daftar');
            const dSave = document.getElementById('daftarNabung');
            const dWallet = document.getElementById('daftarTopUp');

            [dMain, dSave, dWallet].forEach(d => { if(d) d.innerHTML = ""; });

            dataFinance.slice().reverse().forEach(item => {
                let m = (item.tipe === 'masuk' ? 1 : -1);
                if (item.sumber === 'cash') cash += (item.nominal * m);
                else if (item.sumber === 'digital') digital += (item.nominal * m);
                else if (item.sumber === 'tabungan') savings += (item.nominal * m);

                const li = document.createElement('li');
                li.className = 'item';
                li.style.borderLeftColor = item.tipe === 'masuk' ? '#10b981' : '#ef4444';
                li.innerHTML = `
                    <div class="item-info">
                        <h4>${item.keterangan}</h4>
                        <div class="badge-row">
                            <span class="badge ${item.sumber==='cash'?'bg-cash':(item.sumber==='digital'?'bg-digital':'bg-cash')}">${item.sumber}</span>
                            <span class="badge ${item.tipe==='masuk'?'bg-in':'bg-out'}">${item.tipe}</span>
                        </div>
                    </div>
                    <div class="item-amount">
                        <p style="color:${item.tipe==='masuk'?'#10b981':'#ef4444'}">${item.tipe==='masuk'?'+':'-'} ${item.nominal.toLocaleString()}</p>
                        <button class="btn-del" onclick="hapus(${item.id})">hapus</button>
                    </div>
                `;

                if (item.sumber === 'tabungan') { if(dSave) dSave.appendChild(li); }
                else {
                    if(dMain) dMain.appendChild(li);
                    if(item.keterangan.includes("Top Up") && dWallet) dWallet.appendChild(li.cloneNode(true));
                    if (new Date(item.tanggal).getMonth() === new Date().getMonth()) {
                        if (item.tipe === 'masuk') inMon += item.nominal; else outMon += item.nominal;
                    }
                }
            });

            document.getElementById('saldoAktif').innerText = `Rp ${(cash + digital).toLocaleString('id-ID')}`;
            document.getElementById('saldoCash').innerText = `Rp ${cash.toLocaleString()}`;
            document.getElementById('saldoDigital').innerText = `Rp ${digital.toLocaleString()}`;
            document.getElementById('saldoTabungan').innerText = `Rp ${savings.toLocaleString()}`;

            renderChart(inMon, outMon);
        }

        function renderChart(i, o) {
            const ctx = document.getElementById('myChart')?.getContext('2d');
            if (!ctx) return;
            if (myChart) myChart.destroy();
            
            let dataArr = chartMode === 'doughnut' ? [i || 1, o || 0] : [i*0.2, i*0.8, o*0.5, i-o];
            
            myChart = new Chart(ctx, {
                type: chartMode,
                data: {
                    labels: chartMode === 'doughnut' ? ['In', 'Out'] : ['W1','W2','W3','W4'],
                    datasets: [{
                        data: dataArr,
                        backgroundColor: chartMode === 'doughnut' ? ['#10b981', '#ef4444'] : 'rgba(139, 92, 246, 0.2)',
                        borderColor: '#8b5cf6', borderWidth: 2, tension: 0.4, fill: true, cutout: '80%'
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { display: chartMode==='bar' } }, maintainAspectRatio: false }
            });
        }

        function hapus(id) { dataFinance = dataFinance.filter(x => x.id !== id); save(); }
        function exportData() {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(dataFinance)], {type:"application/json"}));
            a.download = "HKR_Final.json"; a.click();
        }
        function importData(e) {
            const r = new FileReader();
            r.onload = (x) => { dataFinance = JSON.parse(x.target.result); save(); };
            r.readAsText(e.target.files[0]);
        }

        window.onload = () => { setTimeout(updateUI, 300); };
    </script>
</body>
</html>
