<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HKR Finance Elite v7</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css?v=7.0">
</head>
<body>

    <div class="app-container">
        
        <div id="page-harian" class="page active">
            <div class="brand-header">
                <div class="brand">HKR<span>FINANCE</span></div>
                <div class="user-avatar">HK</div>
            </div>

            <div class="main-card">
                <p>Uang Siap Pakai</p>
                <h1 id="saldoAktif">Rp 0</h1>
                <div class="card-footer">
                    <div class="sub-stat"><span>Cash</span><p id="saldoCash">Rp 0</p></div>
                    <div class="sub-stat"><span>Digital</span><p id="saldoDigital">Rp 0</p></div>
                </div>
            </div>

            <div class="chart-section">
                <div class="chart-container-sm"><canvas id="myChart"></canvas></div>
                <div class="chart-controls">
                    <span id="btn-line" onclick="setChart('line')" class="active">Trend</span>
                    <span id="btn-bar" onclick="setChart('bar')">Bar</span>
                    <span id="btn-doughnut" onclick="setChart('doughnut')">Ratio</span>
                </div>
            </div>

            <div class="input-compact">
                <div class="i-grid">
                    <input type="text" id="keterangan" placeholder="Ket...">
                    <input type="number" id="nominal" placeholder="Rp...">
                    <select id="sumber">
                        <option value="cash">Cash</option>
                        <option value="digital">Digital</option>
                    </select>
                    <select id="tipe">
                        <option value="keluar">Keluar</option>
                        <option value="masuk">Masuk</option>
                    </select>
                </div>
                <button class="btn-prime-sm" onclick="tambahData()">TAMBAH TRANSAKSI</button>
            </div>
            
            <ul id="daftar" class="transaction-list"></ul>
        </div>

        <div id="page-digital" class="page">
            <div class="brand-header"><div class="brand">E-WALLET<span>HUB</span></div></div>
            <div class="transfer-card">
                <p>Pindahkan Cash ke Digital</p>
                <input type="number" id="nominalTopUp" placeholder="Nominal Rp...">
                <button class="btn-full-sm" onclick="prosesTopUp()">KONFIRMASI TOP UP</button>
            </div>
            <ul id="daftarTopUp" class="transaction-list"></ul>
        </div>

        <div id="page-tabungan" class="page">
            <div class="brand-header"><div class="brand">SAVINGS<span>VAULT</span></div></div>
            <div class="saving-card">
                <p>Total Tabungan</p>
                <h1 id="saldoTabungan">Rp 0</h1>
            </div>
            <div class="transfer-card">
                <input type="number" id="nominalNabung" placeholder="Nominal Rp...">
                <div class="btn-split">
                    <button class="btn-in-sm" onclick="prosesTabungan('masuk')">SIMPAN</button>
                    <button class="btn-out-sm" onclick="prosesTabungan('keluar')">TARIK</button>
                </div>
            </div>
            <ul id="daftarNabung" class="transaction-list"></ul>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('harian')">Utama</div>
            <div class="nav-item" onclick="switchTab('digital')">Digital</div>
            <div class="nav-item" onclick="switchTab('tabungan')">Tabungan</div>
        </nav>
    </div>

    <script src="script.js?v=7.0"></script>
</body>
</html>
